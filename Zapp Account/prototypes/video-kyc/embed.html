<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Zapp Account — Video KYC (Embed)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    /* The 360-wide screen, scaled to fill the iframe width, anchored to the top. */
    .page {
        position: absolute; top: 0; left: 0; width: 360px; min-height: 780px;
        transform-origin: top left; transform: scale(var(--fit, 1));
        background: linear-gradient(180deg, #dbf0ff 0%, #ffffff 37.438%); padding-top: 58px; padding-bottom: 24px;
    }

    /* Fixed status bar — shared coords with intro-animation / carousel. */
    .status-chrome {
        position: fixed;
        top: 0;
        left: 50%;
        width: 360px;
        transform: translateX(-50%) scale(var(--fit, 1));
        transform-origin: top center;
        z-index: 10;
        pointer-events: none;
    }

    .status-chrome .statusbar {
        position: absolute;
        left: 0;
        top: 4px;
        width: 360px;
        height: 44px;
    }

    /* Status bar item coords (shared across journey embeds). */
    .statusbar .time {
        position: absolute;
        left: 18px;
        top: 14px;
        width: 54px;
        text-align: center;
        font-family: 'Inter', sans-serif;
        font-weight: 600;
        font-size: 15px;
        line-height: 18px;
        letter-spacing: -0.16px;
        color: #000;
    }

    .statusbar .sysicons {
        position: absolute;
        right: 22px;
        top: 50%;
        transform: translateY(-50%);
        width: 67px;
        height: 11.5px;
    }

    /* Header */
    .header { position: relative; height: 86px; }
    .back { position: absolute; left: 29px; top: 8px; width: 18px; height: 18px; }
    .help { position: absolute; left: 314px; top: 7px; width: 20px; height: 20px; }
    .title { position: absolute; left: 24px; top: 54px; width: 300px; font-weight: 600; font-size: 20px; line-height: 1.4; color: #252e39; }

    /* Timeline */
    .kyc { position: relative; margin: 34px 24px 0; width: 312px; }
    .vcard { transform-origin: center center; will-change: transform, opacity; }
    .spine { position: absolute; left: 22px; top: 12px; bottom: 12px; width: 0; border-left: 1.5px dashed rgba(63, 102, 140, 0.35); z-index: 0; }

    .trow { position: relative; z-index: 1; display: flex; align-items: center; gap: 11px; padding-left: 14px; margin-bottom: 45px; }
    .trow:last-child { margin-bottom: 0; }
    .trow .ic { width: 16px; height: 16px; flex: none; }
    .trow .lbl { font-weight: 700; font-size: 12px; line-height: 16px; text-transform: uppercase; }
    .trow.checked .lbl { color: #3f668c; letter-spacing: 1px; }
    .trow.future .lbl { color: #b0becf; letter-spacing: 1.8px; font-size: 11px; }
    .freetag {
        display: inline-flex; align-items: center; height: 24px; padding: 0 8px; border-radius: 6px;
        background: linear-gradient(90deg, rgba(155,228,164,0) 0%, rgba(155,228,164,0.5) 100%);
        font-weight: 700; font-size: 12px; line-height: 16px; color: #2ca047; white-space: nowrap; margin-left: 8px;
    }
    .freetag .reg { font-weight: 500; }

    /* Active card */
    .cardrow { padding-left: 0; margin-bottom: 24px; }
    .vcard {
        position: relative; width: 312px; background: #f2f8ff; border: 2px solid #dcefff; border-radius: 16px;
        padding: 13px 16px 16px; display: flex; flex-direction: column; gap: 12px; box-shadow: 0 4px 9px rgba(22, 27, 33, 0.06);
    }
    .vhead { display: flex; align-items: center; gap: 10px; }
    .vhead .chip { width: 32px; height: 34px; display: flex; align-items: center; justify-content: center; flex: none; }
    .vhead .chip img { width: 24px; height: 24px; }
    .vhead .vt { font-weight: 600; font-size: 16px; line-height: 24px; color: #252e39; }
    .vdesc { font-weight: 400; font-size: 12px; line-height: 16px; color: #475769; margin-top: -4px; }
    .vbtn {
        margin-top: 2px; height: 52px; width: 280px; align-self: center; background: #1d86ff; border-radius: 14px;
        display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 14px; cursor: pointer;
    }

    /* Upgrade card benefits grid (true 2x2) */
    .ugrid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .mcard { height: 92px; border-radius: 14px; padding: 11px 12px 14px; display: flex; flex-direction: column; gap: 8px; background: rgba(207,229,252,0.35); }
    .mcard img { width: 24px; height: 24px; }
    .mcard img.ic-wide { width: 28px; height: 21px; }
    .mcard p { font-weight: 500; font-size: 12px; line-height: 1.25; color: #364251; }
    .vnote { display: flex; gap: 8px; align-items: flex-start; }
    .vnote img { width: 16px; height: 16px; flex: none; margin-top: 2px; }
    .vnote p { font-weight: 400; font-size: 12px; line-height: 1.4; color: #61748a; }

    /* Video KYC requirement cards */
    .reqgrid { display: flex; gap: 12px; }
    .req { position: relative; width: 134px; height: 92px; border-radius: 14px; padding: 11px 12px 14px; display: flex; flex-direction: column; gap: 8px; }
    .req.on { background: rgba(188, 216, 246, 0.9); border: 1.8px solid rgba(101, 148, 198, 0.15); }
    .req.off { background: rgba(207, 229, 252, 0.35); }
    .req .ric { width: 24px; height: 24px; }
    .req p { font-weight: 500; font-size: 12px; line-height: 1.25; color: #364251; }
    .req .cb { position: absolute; right: 12px; top: 8px; width: 20px; height: 20px; }
    .req.on .cb { background: #fff; border-radius: 6px; }

    /* Bottom benefit scroller — hidden; was imbalancing the page */
    .benefits { display: none; }
    .benefits::-webkit-scrollbar { width: 0; height: 0; }
    .bcard { width: 150px; height: 92px; border-radius: 14px; padding: 11px 12px 14px; display: flex; flex-direction: column; gap: 8px; flex: none; }
    .bcard img { width: 24px; height: 24px; filter: saturate(0.78) opacity(0.82); }
    .bcard p { font-weight: 500; font-size: 12px; line-height: 1.25; color: #364251; }
    .bcard.blue { background: #f0f8ff; }
    .bcard.lav { background: #f6f0fe; }
    .bcard.green { background: #f0faf3; }
    .bcard.amber { background: #fff7e6; }
</style>
</head>
<body>
    <div class="status-chrome" aria-hidden="true">
        <div class="statusbar">
            <div class="time">9:41</div>
            <img class="sysicons" src="assets/statusbar-right.svg" alt="" />
        </div>
    </div>
    <div class="page">
        <div class="header">
            <img class="back" src="assets/ic-back.svg" alt="Back" />
            <img class="help" src="assets/ic-help.svg" alt="Help" />
            <div class="title">Let's Get You Verified</div>
        </div>

        <div class="kyc" id="kyc"></div>

        <div class="benefits">
            <div class="bcard blue"><img src="assets/ic-scan.svg" alt="" /><p>Scan any QR code &amp; pay via UPI</p></div>
            <div class="bcard lav"><img src="assets/ic-bank.svg" alt="" /><p>Keep your bank statement clean</p></div>
            <div class="bcard green"><img src="assets/ic-bank-transfer.svg" alt="" /><p>Transfer money to any bank account</p></div>
            <div class="bcard amber"><img src="assets/ic-swipe.svg" alt="" /><p>Pay instantly with swipe, scan or tap</p></div>
        </div>
    </div>

    <script>
        (function () {
            const DWELL_MS = 3000;

            // scale the 360-wide page to fill the iframe width
            function fit() {
                document.documentElement.style.setProperty("--fit", window.innerWidth / 360);
            }
            fit();
            window.addEventListener("resize", fit);

            const benefitGrid =
                '<div class="ugrid">' +
                    '<div class="mcard"><img src="assets/ic-scan-mono.svg" alt=""><p>Scan any QR code &amp; pay via UPI</p></div>' +
                    '<div class="mcard"><img src="assets/ic-bank-mono.svg" alt=""><p>Keep your bank statement clean</p></div>' +
                    '<div class="mcard"><img class="ic-wide" src="assets/ic-bank-transfer-mono.svg" alt=""><p>Transfer money to any bank account</p></div>' +
                    '<div class="mcard"><img src="assets/ic-swipe-mono.svg" alt=""><p>Pay instantly with swipe, scan or tap</p></div>' +
                '</div>';

            const reqGrid =
                '<div class="reqgrid">' +
                    '<div class="req on"><img class="ric" src="assets/ic-mobile.svg" alt=""><p>Aadhaar is linked to phone number</p><img class="cb" src="assets/ic-checkbox-on.svg" alt=""></div>' +
                    '<div class="req off"><img class="ric" src="assets/ic-pan.svg" alt=""><p>Original Aadhaar is with me</p><img class="cb" src="assets/ic-checkbox-off.svg" alt=""></div>' +
                '</div>';

            const STEPS = [
                {
                    checkedLabel: "PAN Verified",
                    futureLabel: "PAN Verification",
                    card: { icon: "ic-pan-card.svg", title: "Verify PAN Details", desc: "Complete your PAN verification and enjoy super fast and secure payments", body: "", btn: "Verify PAN" }
                },
                {
                    checkedLabel: "Employment Details",
                    futureLabel: "Employment Details",
                    card: { icon: "ic-user.svg", title: "Employment Details", desc: "Fill in your employment details to complete the verification", body: "", btn: "Add Details" }
                },
                {
                    checkedLabel: "Zapp Account Upgrade Complete",
                    futureLabel: "Zapp Account Upgrade Fee",
                    futureTag: true,
                    card: { icon: "ic-wallet.svg", title: "Upgrade Zapp Account", desc: "Upgrade to unlock more benefits on your account:", body: benefitGrid + '<div class="vnote"><img src="assets/ic-info.svg" alt=""><p>If the upgrade fails, the fee will be refunded back to you</p></div>', btn: "Pay \u20B9200" }
                },
                {
                    checkedLabel: "Video KYC",
                    futureLabel: "Video KYC",
                    card: { icon: "ic-video-kyc.svg", title: "Video KYC", desc: "Before proceeding to vKYC please ensure the following:", body: reqGrid, btn: "I confirm" }
                }
            ];

            const kyc = document.getElementById("kyc");

            function compactRow(step, checked, key) {
                const cls = checked ? "checked" : "future";
                const icon = checked ? "ic-check.svg" : "ic-unchecked.svg";
                const label = checked ? step.checkedLabel : step.futureLabel;
                const tag = (!checked && step.futureTag)
                    ? '<span class="freetag"><span>FREE</span><span class="reg">&nbsp;for Limited Time</span></span>'
                    : "";
                return '<div class="trow ' + cls + '" data-key="' + key + '"><img class="ic" src="assets/' + icon + '" alt=""><div class="lbl">' + label + '</div>' + tag + '</div>';
            }

            function cardRow(c, key) {
                return '<div class="trow cardrow" data-key="' + key + '"><div class="vcard">' +
                    '<div class="vhead"><span class="chip"><img src="assets/' + c.icon + '" alt=""></span><span class="vt">' + c.title + '</span></div>' +
                    '<div class="vdesc">' + c.desc + '</div>' +
                    c.body +
                    '<div class="vbtn">' + c.btn + '</div>' +
                    '</div></div>';
            }

            function render(active) {
                let html = '<div class="spine"></div>';
                STEPS.forEach((s, i) => {
                    if (i === active) html += cardRow(s.card, i);
                    else html += compactRow(s, i < active, i);
                });
                html += '<div class="trow future" data-key="unlock"><img class="ic" src="assets/ic-star.svg" alt=""><div class="lbl">Unlock all Features</div></div>';
                kyc.innerHTML = html;
            }

            const OUT_MS = 180;
            const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
            const benefits = document.querySelector(".benefits");

            const REST = "translateY(0) scale(1)";
            const ENTER_FROM = "translateY(-10px) scale(0.97)";
            const EXIT_TO = "translateY(10px) scale(0.97)";
            const FLIP_MS = 440;

            function showIn(idx) {
                const oldTop = {};
                let oldBenTop = 0;
                if (!reduceMotion) {
                    kyc.querySelectorAll(".trow[data-key]").forEach((r) => { oldTop[r.dataset.key] = r.getBoundingClientRect().top; });
                    oldBenTop = benefits.getBoundingClientRect().top;
                }

                render(idx);

                const card = kyc.querySelector(".vcard");
                if (reduceMotion) return;

                const rows = kyc.querySelectorAll(".trow[data-key]");
                rows.forEach((r) => {
                    if (r.classList.contains("cardrow")) return;
                    const k = r.dataset.key;
                    if (oldTop[k] === undefined) return;
                    const delta = oldTop[k] - r.getBoundingClientRect().top;
                    if (Math.abs(delta) > 0.5) {
                        r.style.transition = "none";
                        r.style.transform = "translateY(" + delta + "px)";
                        r.dataset.flip = "1";
                    }
                });
                const benDelta = oldBenTop - benefits.getBoundingClientRect().top;
                const benMoves = Math.abs(benDelta) > 0.5;
                if (benMoves) { benefits.style.transition = "none"; benefits.style.transform = "translateY(" + benDelta + "px)"; }

                void kyc.offsetWidth;

                rows.forEach((r) => {
                    if (r.dataset.flip) {
                        r.style.transition = "transform " + FLIP_MS + "ms cubic-bezier(0.22, 1, 0.36, 1)";
                        r.style.transform = "translateY(0)";
                    }
                });
                if (benMoves) {
                    benefits.style.transition = "transform " + FLIP_MS + "ms cubic-bezier(0.22, 1, 0.36, 1)";
                    benefits.style.transform = "translateY(0)";
                }

                if (card) {
                    card.style.transition = "none";
                    card.style.opacity = "0";
                    card.style.transform = ENTER_FROM;
                    void card.offsetWidth;
                    card.style.transition = "opacity 416ms ease, transform 416ms cubic-bezier(0.22, 1, 0.36, 1)";
                    card.style.opacity = "1";
                    card.style.transform = REST;
                }
            }

            let i = 0;
            showIn(0);
            setInterval(() => {
                const card = kyc.querySelector(".vcard");
                if (reduceMotion || !card) { i = (i + 1) % STEPS.length; render(i); return; }
                card.style.transition = "opacity " + OUT_MS + "ms ease, transform " + OUT_MS + "ms ease";
                card.style.opacity = "0";
                card.style.transform = EXIT_TO;
                window.setTimeout(() => { i = (i + 1) % STEPS.length; showIn(i); }, OUT_MS);
            }, DWELL_MS);
        })();
    </script>
</body>
</html>
